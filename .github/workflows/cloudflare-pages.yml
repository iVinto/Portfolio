name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: "cloudflare-pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare static site
        run: |
          mkdir cloudflare-dist
          cp index.html gallery.html style.css device.js events.js index-page.js gallery.js robots.txt sitemap.xml cloudflare-dist/
          cp favicon.svg favicon.ico favicon-32x32.png apple-touch-icon.png og-image.png cloudflare-dist/
          cp -R Photography_web cloudflare-dist/

      - name: Deploy
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy cloudflare-dist --project-name=vinto-portfolio --branch=main --commit-dirty=false
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip deploy without Cloudflare secrets
        if: env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "Cloudflare deploy skipped. Add CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN as repository secrets to enable automatic deploys."
