<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bambi Tour</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
      color: #333;
      overflow: hidden; /* Prevent scrolling */
      transition: background-color 0.5s ease, color 0.5s ease;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      background: rgba(255, 255, 255, 0.8); /* Semi-transparent background */
      padding: 10px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      z-index: 3;
    }
    .header .controls {
      display: flex;
      gap: 10px;
    }
    .header .controls button {
      margin: 0;
      padding: 10px;
      cursor: pointer;
      background: none;
      border: none;
      color: inherit;
      transition: color 0.5s ease;
    }
    .header .controls button.selected::before {
      content: '[•] ';
    }
    .header .controls button.unselected::before {
      content: '[ ] ';
    }
    .header .vinto {
      position: absolute;
      left: 20px;
      top: 10px;
      font-weight: bold;
      font-size: 1.2em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 60px 20px 20px; /* Adjust padding for header space */
    }
    .grid img {
      width: 100%;
      cursor: pointer;
      transition: opacity 0.5s ease, transform 0.5s ease;
      position: relative;
    }
    .fullscreen {
      display: none;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background-color: inherit;
      z-index: 2;
      transition: background-color 0.5s ease;
    }
    .fullscreen img {
      max-width: 80%;
      max-height: 80%;
      transition: transform 0.5s ease;
      position: absolute;
    }
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 4;
    }
    .overlay .text {
      font-size: 2em;
      color: #333;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="vinto">VINTO</div>
    <div class="controls">
      <button id="indexButton" onclick="showGrid()">Index</button>
      <button id="portfolioButton" onclick="redirectToPortfolio()">Portfolio</button>
      <button id="imageInfoButton" onclick="toggleImageInfo()">IMAGE INFO</button>
    </div>
  </div>
  
  <div class="grid">
    <img src="./Photography/Bambi/1.jpg" alt="Bambi Tour Image 1" data-index="0">
    <img src="./Photography/Bambi/2.jpg" alt="Bambi Tour Image 2" data-index="1">
    <img src="./Photography/Bambi/3.jpg" alt="Bambi Tour Image 3" data-index="2">
    <img src="./Photography/Bambi/4.jpg" alt="Bambi Tour Image 4" data-index="3">
    <img src="./Photography/Bambi/5.jpg" alt="Bambi Tour Image 5" data-index="4">
  </div>
  
  <div class="fullscreen">
    <img src="" alt="Fullscreen Image">
  </div>

  <div class="overlay" id="imageInfoOverlay">
    <div class="text">Image Info Text</div>
  </div>

  <script>
    const gridImages = document.querySelectorAll('.grid img');
    const fullscreenDiv = document.querySelector('.fullscreen');
    const fullscreenImg = document.querySelector('.fullscreen img');
    const overlayDiv = document.getElementById('imageInfoOverlay');
    const imageInfoButton = document.getElementById('imageInfoButton');
    const whiteButton = document.getElementById('whiteButton');
    const blackButton = document.getElementById('blackButton');
    const indexButton = document.getElementById('indexButton');
    const portfolioButton = document.getElementById('portfolioButton');
    let currentIndex = 0;
    let isFullscreen = false;
    let isOverlayVisible = false;

    gridImages.forEach(img => {
      img.addEventListener('click', (e) => {
        currentIndex = parseInt(img.getAttribute('data-index'));
        showFullscreen(img);
      });
    });

    function showFullscreen(img) {
      isFullscreen = true;
      updateButtonSelection();
      const rect = img.getBoundingClientRect();
      
      // Fade out all images
      gridImages.forEach(image => {
        if (image !== img) {
          image.style.opacity = '0';
        }
      });

      // Position and size the fullscreen image
      fullscreenImg.src = img.src;
      fullscreenImg.style.left = `${rect.left}px`;
      fullscreenImg.style.top = `${rect.top}px`;
      fullscreenImg.style.width = `${rect.width}px`;
      fullscreenImg.style.height = `${rect.height}px`;

      fullscreenDiv.style.display = 'flex';
      fullscreenImg.style.transform = `translate(-50%, -50%) scale(${rect.width / window.innerWidth * 0.8})`;
      
      // Trigger reflow to apply initial styles
      void fullscreenImg.offsetWidth;

      // Animate to final position and size
      setTimeout(() => {
        fullscreenImg.style.transform = 'translate(-50%, -50%) scale(1)';
        fullscreenImg.style.left = '50%';
        fullscreenImg.style.top = '50%';
        fullscreenImg.style.width = '';
        fullscreenImg.style.height = '';
      }, 0);
    }

    function showGrid() {
      isFullscreen = false;
      updateButtonSelection();
      fullscreenDiv.style.display = 'none';
      fullscreenImg.style.transform = 'scale(0)';
      
      // Fade in all images
      gridImages.forEach(img => {
        img.style.opacity = '1';
      });
    }

    function redirectToPortfolio() {
      window.location.href = 'Portfolio.html';
    }

    function toggleImageInfo() {
      isOverlayVisible = !isOverlayVisible;
      overlayDiv.style.display = isOverlayVisible ? 'flex' : 'none';
    }

    function changeBackgroundColor(color) {
      const currentColor = document.body.style.backgroundColor;
      document.body.style.backgroundColor = color;
      fullscreenDiv.style.backgroundColor = color;
      document.body.style.color = color === '#000' ? '#fff' : '#000';

      // Trigger reflow to reset transition
      void document.body.offsetWidth;
      void fullscreenDiv.offsetWidth;

      // Apply color transition
      document.body.style.transition = 'background-color 0.5s ease, color 0.5s ease';
      fullscreenDiv.style.transition = 'background-color 0.5s ease';

      updateButtonSelection();
    }

    function updateButtonSelection() {
      whiteButton.classList.remove('selected');
      whiteButton.classList.add('unselected');
      blackButton.classList.remove('selected');
      blackButton.classList.add('unselected');
      indexButton.classList.remove('selected');
      indexButton.classList.add('unselected');
      portfolioButton.classList.remove('selected');
      portfolioButton.classList.add('unselected');
      imageInfoButton.classList.remove('selected');
      imageInfoButton.classList.add('unselected');

      const currentBgColor = document.body.style.backgroundColor;
      if (currentBgColor === 'rgb(0, 0, 0)') {
        blackButton.classList.add('selected');
        blackButton.classList.remove('unselected');
      } else {
        whiteButton.classList.add('selected');
        whiteButton.classList.remove('unselected');
      }

      if (!isFullscreen) {
        indexButton.classList.add('selected');
        indexButton.classList.remove('unselected');
      }

      if (isOverlayVisible) {
        imageInfoButton.classList.add('selected');
        imageInfoButton.classList.remove('unselected');
      }
    }

    fullscreenDiv.addEventListener('click', (e) => {
      if (e.clientX > window.innerWidth / 2) {
        currentIndex = (currentIndex + 1) % gridImages.length;
      } else {
        currentIndex = (currentIndex - 1 + gridImages.length) % gridImages.length;
      }
      fullscreenImg.src = gridImages[currentIndex].src;
    });

    window.addEventListener('load', updateButtonSelection);
  </script>
</body>
</html>
