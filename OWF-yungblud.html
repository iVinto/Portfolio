<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinto's Yungblud Orange Warsaw Festival 2024</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
      color: black;
      overflow: scroll;
      transition: background-color 1s, color 1s;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      padding: 3.75rem 2.5rem;
    }
    .grid img {
      width: 100%;
      cursor: pointer;
    }
    .fullscreen {
      display: none;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background-color: inherit;
      z-index: 2;
    }
    .fullscreen img {
      max-width: 80%;
      max-height: 80%;
      position: absolute;
    }
    .controls {
      position: fixed;
      bottom: 0.75rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      gap: 3.75rem;
    }
    .controls button {
      margin: 0.25rem;
      padding: 0.75rem;
      cursor: pointer;
      background: none;
      border: none;
      color: inherit;
      position: relative;
    }
    .controls button.selected::before {
      content: '[•] ';
    }
    .controls button.unselected::before {
      content: '[ ] ';
    }
    .controlsTOP {
      position: fixed;
      top: 0.75rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      gap: 3.75rem;
    }
    .controlsTOP button {
      margin: 0.25rem;
      padding: 0.75rem;
      cursor: pointer;
      background: none;
      border: none;
      color: inherit;
      position: relative;
    }
    .controlsTOP button.selected::before {
      content: '[•] ';
    }
    .controlsTOP button.unselected::before {
      content: '[ ] ';
    }
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(5px);
      z-index: 2;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .overlay.visible {
      display: flex;
      opacity: 1;
    }
    .overlay .content {
      text-align: left;
      font-size: 24px;
      color: inherit;
    }
    .overlay .paddingOVERLAY {
      padding-top: 0.75rem;
      padding-bottom: 2.5em;
    }
    .overlay .aboutDATE {
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="controlsTOP">
    <button id="portfolioButton" onclick="goToPage('Portfolio.html')">[ ] Portfolio</button>
    <button id="aboutButton" onclick="toggleOverlay()">About</button>
    <button id="indexButton" onclick="showGrid()">Index</button>
  </div>
  <div class="grid">
    <img src="./Photography/OWF_Yungblud/1.jpg" alt="Yungblud OWF Image 1" data-index="0">
    <img src="./Photography/OWF_Yungblud/2.jpg" alt="Yungblud OWF Image 2" data-index="1">
    <img src="./Photography/OWF_Yungblud/3.jpg" alt="Yungblud OWF Image 3" data-index="2">
    <img src="./Photography/OWF_Yungblud/4.jpg" alt="Yungblud OWF Image 4" data-index="3">
    <img src="./Photography/OWF_Yungblud/5.jpg" alt="Yungblud OWF Image 5" data-index="4">
    <img src="./Photography/OWF_Yungblud/6.jpg" alt="Yungblud OWF Image 6" data-index="5">
    <img src="./Photography/OWF_Yungblud/7.jpg" alt="Yungblud OWF Image 7" data-index="6">
  </div>
  <div class="fullscreen">
    <img src="" alt="Fullscreen Image">
  </div>
  <div class="controls">
    <button id="whiteButton" onclick="changeBackgroundColor('#fff')">White Background</button>
    <button id="blackButton" onclick="changeBackgroundColor('#000')">Black Background</button>
  </div>
  <div class="overlay" id="overlay">
    <div class="content">
      <div style="font-style: normal; font-size: 20px;">YUNGBLUD AT ORANGE WARSAW FESTIVAL</div>
      <div class="paddingOVERLAY" style="font-size: 16px;">Photo relation from OWF for a media outlet.</div>
      <div class="aboutDATE" style="font-style: italic; font-size: 12px;">07.06.2024</div>
      <div class="aboutDATE" style="font-style: italic; font-size: 12px;">Tor Wyscigow Konnych Sluzewiec, Warsaw, Poland</div>
    </div>
  </div>

  <script>
    const gridImages = document.querySelectorAll('.grid img');
    const fullscreenDiv = document.querySelector('.fullscreen');
    const fullscreenImg = document.querySelector('.fullscreen img');
    const whiteButton = document.getElementById('whiteButton');
    const blackButton = document.getElementById('blackButton');
    const indexButton = document.getElementById('indexButton');
    const aboutButton = document.getElementById('aboutButton');
    const overlay = document.getElementById('overlay');
    let currentIndex = 0;
    let isFullscreen = false;
    let isOverlayVisible = false;

    gridImages.forEach(img => {
      img.addEventListener('click', () => {
        currentIndex = parseInt(img.getAttribute('data-index'));
        showFullscreen(img);
      });
    });

    function showFullscreen(img) {
      isFullscreen = true;
      updateButtonSelection();
      const rect = img.getBoundingClientRect();
      fullscreenImg.src = img.src;
      fullscreenImg.style.left = `${rect.left}px`;
      fullscreenImg.style.top = `${rect.top}px`;
      fullscreenImg.style.width = `${rect.width}px`;
      fullscreenImg.style.height = `${rect.height}px`;

      gridImages.forEach(img => img.style.opacity = '0.1');
      fullscreenDiv.style.display = 'flex';

      setTimeout(() => {
        fullscreenImg.style.transform = 'translate(-50%, -50%) scale(1)';
        fullscreenImg.style.left = '50%';
        fullscreenImg.style.top = '50%';
        fullscreenImg.style.width = '';
        fullscreenImg.style.height = '';
      }, 0);
    }

    function showGrid() {
      isFullscreen = false;
      isOverlayVisible = false;
      updateButtonSelection();
      fullscreenDiv.style.display = 'none';
      fullscreenImg.style.transform = 'scale(0)';
      gridImages.forEach(img => img.style.opacity = '1');
      overlay.classList.remove('visible');
      setTimeout(() => {
        overlay.style.display = 'none';
      }, 1000); // Wait for the fade-out transition to complete
    }

    function changeBackgroundColor(color) {
      const currentColor = document.body.style.backgroundColor;
      document.body.style.backgroundColor = color;
      fullscreenDiv.style.backgroundColor = color;
      overlay.style.backgroundColor = color === '#000' ? 'rgba(0, 0, 0, 0.8)' : 'rgba(255, 255, 255, 0.8)';
      document.body.style.color = color === '#000' ? '#fff' : '#000';
      document.querySelector('.overlay .content').style.color = color === '#000' ? '#fff' : '#000';
      
      // Trigger reflow to reset transition
      void document.body.offsetWidth;
      void fullscreenDiv.offsetWidth;

      // Apply color transition
      document.body.style.transition = 'background-color 0.5s ease, color 0.5s ease';
      fullscreenDiv.style.transition = 'background-color 0.5s ease';
      
      updateButtonSelection();
    }

    function updateButtonSelection() {
      whiteButton.classList.toggle('selected', document.body.style.backgroundColor === 'rgb(255, 255, 255)');
      whiteButton.classList.toggle('unselected', document.body.style.backgroundColor !== 'rgb(255, 255, 255)');
      blackButton.classList.toggle('selected', document.body.style.backgroundColor === 'rgb(0, 0, 0)');
      blackButton.classList.toggle('unselected', document.body.style.backgroundColor !== 'rgb(0, 0, 0)');
      indexButton.classList.toggle('selected', !isFullscreen && !isOverlayVisible);
      indexButton.classList.toggle('unselected', isFullscreen || isOverlayVisible);
      aboutButton.classList.toggle('selected', isOverlayVisible);
      aboutButton.classList.toggle('unselected', !isOverlayVisible);
    }

    function toggleOverlay() {
      isOverlayVisible = !isOverlayVisible;
      if (isOverlayVisible) {
        overlay.style.display = 'flex';
        setTimeout(() => {
          overlay.classList.add('visible');
        }, 0); // Delay to trigger the transition
      } else {
        overlay.classList.remove('visible');
        setTimeout(() => {
          overlay.style.display = 'none';
        }, 1000); // Wait for the fade-out transition to complete
      }
      updateButtonSelection();
    }

    fullscreenDiv.addEventListener('click', (e) => {
      if (e.clientX > window.innerWidth / 2) {
        currentIndex = (currentIndex + 1) % gridImages.length;
      } else {
        currentIndex = (currentIndex - 1 + gridImages.length) % gridImages.length;
      }
      fullscreenImg.src = gridImages[currentIndex].src;
    });

    window.addEventListener('keydown', (e) => {
      if (isFullscreen) {
        if (e.key === 'ArrowRight') {
          currentIndex = (currentIndex + 1) % gridImages.length;
        } else if (e.key === 'ArrowLeft') {
          currentIndex = (currentIndex - 1 + gridImages.length) % gridImages.length;
        }
        fullscreenImg.src = gridImages[currentIndex].src;
      }
    });

    window.addEventListener('load', updateButtonSelection);

    function goToPage(url) {
      window.location.href = url;
    }
  </script>
</body>
</html>
